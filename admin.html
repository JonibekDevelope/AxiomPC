<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Card System</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      gap:30px;
      padding:30px;
      flex-wrap:wrap;
    }

    /* ADMIN PANEL */

    .admin-panel{
      width:350px;
      background:#111827;
      padding:25px;
      border-radius:20px;
      height:fit-content;
      border:1px solid rgba(255,255,255,0.1);
    }

    .admin-panel h2{
      margin-bottom:25px;
      font-size:28px;
    }

    .input-box{
      margin-bottom:18px;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;
      color:#9ca3af;
    }

    .input-box input,
    .input-box textarea{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#1e293b;
      color:white;
      resize:none;
    }

    .add-btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:.3s;
      font-weight:bold;
    }

    .add-btn:hover{
      background:#6d28d9;
    }

    /* PRODUCTS */

    .products{
      flex:1;
    }

    .products h1{
      margin-bottom:30px;
      font-size:42px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .card{
      background:#111827;
      border-radius:22px;
      overflow:hidden;
      transition:.4s;
      border:1px solid rgba(255,255,255,0.08);
      position:relative;
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:22px;
    }

    .tag{
      background:#7c3aed;
      padding:7px 14px;
      border-radius:50px;
      display:inline-block;
      font-size:13px;
      margin-bottom:15px;
    }

    .title{
      font-size:26px;
      margin-bottom:12px;
    }

    .description{
      color:#9ca3af;
      line-height:1.6;
      margin-bottom:20px;
    }

    .bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .price{
      font-size:24px;
      font-weight:bold;
    }

    .buy-btn{
      border:none;
      padding:11px 18px;
      border-radius:10px;
      background:#7c3aed;
      color:white;
      cursor:pointer;
    }

    .delete-btn{
      position:absolute;
      top:12px;
      right:12px;
      width:35px;
      height:35px;
      border:none;
      border-radius:50%;
      background:red;
      color:white;
      cursor:pointer;
      font-size:18px;
    }

    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .admin-panel{
        width:100%;
      }

    }

  </style>
</head>
<body>

  <!-- ADMIN PANEL -->

  <div class="admin-panel">

    <h2>Admin Panel</h2>

    <div class="input-box">
      <label>Product Name</label>
      <input type="text" id="title">
    </div>

    <div class="input-box">
      <label>Description</label>
      <textarea id="description"></textarea>
    </div>

    <div class="input-box">
      <label>Price</label>
      <input type="text" id="price">
    </div>

    <div class="input-box">
      <label>Category</label>
      <input type="text" id="category">
    </div>

    <div class="input-box">
      <label>Image URL</label>
      <input type="text" id="image">
    </div>

    <button class="add-btn">
      Add Product
    </button>

  </div>

  <!-- PRODUCTS -->

  <div class="products">

    <h1>Products</h1>

    <div class="cards" id="cards"></div>

  </div>

  <script>

  const cards = document.getElementById("cards");

  // API DAN PRODUCTLARNI OLISH

  async function getProducts(){

    try{

      const response = await fetch(
        "https://fakestoreapi.com/products"
      );

      const data = await response.json();

      renderProducts(data);

    }catch(error){

      console.log(error);

    }

  }

  // PRODUCTLARNI CHIQARISH

  function renderProducts(products){

    cards.innerHTML = "";

    products.forEach(product => {

      cards.innerHTML += `

        <div class="card">

          <img src="${product.image}" alt="">

          <div class="card-content">

            <span class="tag">
              ${product.category}
            </span>

            <h2 class="title">
              ${product.title}
            </h2>

            <p class="description">
              ${product.description.slice(0,80)}...
            </p>

            <div class="bottom">

              <span class="price">
                $${product.price}
              </span>

              <button class="buy-btn">
                Buy Now
              </button>

            </div>

          </div>

        </div>

      `;

    });

  }

  getProducts();

  

</script>

</body>
</html>
